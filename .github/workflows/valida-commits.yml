name: valida commits

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: verifica formato das mensagens
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="origin/${{ github.base_ref }}..HEAD"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            range="${{ github.event.after }} --max-count=20"
          else
            range="${{ github.event.before }}..${{ github.event.after }}"
          fi
          status=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in
              Merge*|Revert*|fixup!*|squash!*) continue ;;
            esac
            len=$(printf '%s' "$line" | wc -c)
            if [ "$len" -gt 72 ]; then
              echo "ERRO (mais de 72 caracteres): $line"; status=1; continue
            fi
            if ! printf '%s' "$line" | grep -Eq '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9._-]+\))?: [a-z0-9]'; then
              echo "ERRO (formato invalido): $line"; status=1; continue
            fi
            if printf '%s' "$line" | grep -q '[A-Z]'; then
              echo "ERRO (letras maiusculas): $line"; status=1
            fi
          done < <(git log --format=%s $range)
          if [ "$status" -eq 0 ]; then echo "todas as mensagens estao no padrao"; fi
          exit $status